<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Transformation - Admitted Student Day | Derby Marketing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: '#7FB069',
                        dark: '#0B0B0A',
                        card: '#5C6B73',
                        light: '#FEFFFE',
                        green: '#105632',
                        text: '#778992',
                    }
                }
            }
        }
    </script>
    <style>
        .select-none { user-select: none; }
        input[type=range]::-webkit-slider-thumb {
            pointer-events: all;
            width: 40px;
            height: 40px;
            appearance: none;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 45vh;
            width: 100%;
        }
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background: #7FB069;
            border-radius: 4px 0 0 4px;
        }
        .glow-brand {
            box-shadow: 0 0 40px rgba(127,176,105,0.15);
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .pulse-soft { animation: pulse-soft 2.5s ease-in-out infinite; }

        .cap-badge {
            background: linear-gradient(135deg, #0B0B0A 0%, #1a2a1a 100%);
            border: 1px solid rgba(127,176,105,0.3);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 24px;
            bottom: -24px;
            width: 2px;
            background: linear-gradient(to bottom, #7FB069, rgba(127,176,105,0.1));
        }
        .timeline-item:last-child::before { display: none; }
    </style>
</head>

<body class="bg-light text-slate-300 font-sans antialiased selection:bg-brand selection:text-white">
    
    <nav class="fixed w-full z-[100] bg-dark/80 backdrop-blur-md border-b border-white/10" x-data="{ open: false }">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="font-heading font-bold text-2xl text-white tracking-tight">
                    DERBY<span class="text-brand">.</span>MARKETING
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="work-draft.html" class="text-m font-medium text-light hover:text-brand transition">Projects</a>
                    <a href="build-log.html" class="text-m font-medium text-light hover:text-brand transition">Log</a>
                    <a href="about.html" class="text-m font-medium text-light hover:text-brand transition">About Me</a>
                    <a href="contact.html" class="px-5 py-2.5 rounded-full bg-light text-dark font-bold text-sm hover:bg-brand hover:text-white transition">Let's Talk</a>
                </div>
                <button @click="open = !open" class="md:hidden text-white focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div x-show="open" class="md:hidden bg-card border-b border-white/10" @click.away="open = false">
            <div class="flex flex-col px-6 py-4 space-y-4">
                <a href="work-draft.html" class="text-white">Work</a>
                <a href="build-log.html" class="text-white">Log</a>
                <a href="about.html" class="text-brand font-bold">About Me</a>
                <a href="contact.html" class="text-white">Contact</a>
            </div>
        </div>
    </nav>
</body>
</html>
