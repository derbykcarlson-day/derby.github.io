    <style>
        .select-none { user-select: none; }
        input[type=range]::-webkit-slider-thumb {
            pointer-events: all;
            width: 40px;
            height: 40px;
            appearance: none;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 45vh;
            width: 100%;
        }
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background: #7FB069;
            border-radius: 4px 0 0 4px;
        }
        .glow-brand {
            box-shadow: 0 0 40px rgba(127,176,105,0.15);
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .pulse-soft { animation: pulse-soft 2.5s ease-in-out infinite; }

        .cap-badge {
            background: linear-gradient(135deg, #0B0B0A 0%, #1a2a1a 100%);
            border: 1px solid rgba(127,176,105,0.3);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 24px;
            bottom: -24px;
            width: 2px;
            background: linear-gradient(to bottom, #7FB069, rgba(127,176,105,0.1));
        }
        .timeline-item:last-child::before { display: none; }
    </style>
</head>
