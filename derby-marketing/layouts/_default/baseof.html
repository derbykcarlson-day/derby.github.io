<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'], // <-- Add this line
                    },
                    colors: {
                        brand: '#7FB069',
                        dark: '#0B0B0A',
                        card: '#161614',
                        light: '#FEFFFE',
                        green: '#105632',
                        text: '#778992',
                    }
                }
            }
        }
    </script>

    <style>
        .glow-brand { box-shadow: 0 0 40px rgba(127,176,105,0.15); }
        .text-gradient { background: linear-gradient(to right, #7FB069, #105632); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .select-none { user-select: none; }
        input[type=range]::-webkit-slider-thumb {
            pointer-events: all;
            width: 40px;
            height: 40px;
            appearance: none;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 45vh;
            width: 100%;
        }
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background: #7FB069;
            border-radius: 4px 0 0 4px;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .pulse-soft { animation: pulse-soft 2.5s ease-in-out infinite; }
        .cap-badge {
            background: linear-gradient(135deg, #0B0B0A 0%, #1a2a1a 100%);
            border: 1px solid rgba(127,176,105,0.3);
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 24px;
            bottom: -24px;
            width: 2px;
            background: linear-gradient(to bottom, #7FB069, rgba(127,176,105,0.1));
        }
        .timeline-item:last-child::before { display: none; }
        .timeline-line { background: linear-gradient(to bottom, #7FB069, rgba(127,176,105,0.1)); }
        .log-line { 
            position: relative; 
            padding-left: 2rem; 
        }
        .log-line::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #7FB069, #7FB069 50%, transparent);
        }
    </style>
</head>

<body class="bg-light text-slate-300 font-sans antialiased selection:bg-brand selection:text-white">
    
    {{ partial "nav.html" . }}

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

</body>
</html>
